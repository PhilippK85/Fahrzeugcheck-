<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FzCheck">
<meta name="theme-color" content="#b91c1c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Fahrzeugcheck</title>
<style>
  :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #fafaf9; color: #1c1917;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
    padding: calc(14px + var(--safe-top)) 12px calc(20px + var(--safe-bottom));
    max-width: 700px; margin: 0 auto;
    -webkit-text-size-adjust: 100%;
    -webkit-overflow-scrolling: touch;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 16px; }
  .header h1 { font-size: 24px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #1c1917; }
  .header p { font-size: 13px; color: #78716c; margin-top: 3px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 12px 4px; border-radius: 14px; cursor: pointer;
    font-weight: 700; font-size: 16px; text-align: center;
    border: 2.5px solid #d6d3d1; background: #fff; color: #57534e;
    transition: all 0.2s; -webkit-appearance: none; font-family: inherit;
  }
  .tab:active { transform: scale(0.97); }
  .tab.active { color: #fff; box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
  .tab-pct { font-size: 12px; font-weight: 500; opacity: 0.8; margin-top: 3px; }

  /* Progress */
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 0 2px; }
  .progress-bg { flex: 1; height: 10px; background: #e7e5e4; border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 5px; transition: width 0.4s ease; }
  .progress-text { font-size: 15px; font-weight: 700; min-width: 58px; text-align: right; }
  .reset-btn {
    font-size: 13px; padding: 6px 14px; background: #f5f5f4; border: 1.5px solid #d6d3d1;
    color: #78716c; border-radius: 10px; cursor: pointer; font-weight: 600;
    font-family: inherit; -webkit-appearance: none;
  }
  .reset-btn:active { background: #e7e5e4; }

  /* Vehicle view */
  .vehicle-wrap {
    position: relative; width: 100%; padding-bottom: 50%;
    background: #fff; border-radius: 18px; overflow: hidden;
    margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .vehicle-inner { position: absolute; inset: 0; }
  .vehicle-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; }

  /* Zone buttons */
  .zone-btn {
    position: absolute; border-radius: 12px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.2s; z-index: 2; padding: 3px;
    border-width: 2.5px; border-style: solid;
    -webkit-appearance: none; font-family: inherit;
    box-shadow: 0 1px 5px rgba(0,0,0,0.1);
  }
  .zone-btn:active { transform: scale(0.95); }
  .zone-label { font-size: 11px; font-weight: 700; line-height: 1.15; text-align: center; pointer-events: none; }
  .zone-count { font-size: 10px; opacity: 0.85; margin-top: 1px; pointer-events: none; }

  /* Panel */
  .panel {
    background: #fff; border-radius: 18px; padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    animation: fadeIn 0.25s ease;
  }
  .panel-title { font-size: 19px; font-weight: 800; margin-bottom: 14px; }

  /* Category */
  .cat-btn {
    width: 100%; display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; background: #fafaf9;
    border: 1.5px solid #e7e5e4; border-radius: 12px;
    cursor: pointer; font-size: 15px; font-weight: 600;
    text-align: left; transition: all 0.15s; color: #1c1917;
    margin-bottom: 8px; font-family: inherit; -webkit-appearance: none;
  }
  .cat-btn:active { transform: scale(0.98); }
  .cat-btn.expanded { border-width: 2px; }
  .cat-btn.complete { color: #16a34a; }
  .cat-badge {
    width: 26px; height: 26px; border-radius: 8px; background: #e7e5e4;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #78716c; flex-shrink: 0;
  }
  .cat-badge.complete { background: #16a34a; color: #fff; }
  .cat-name { flex: 1; }
  .cat-count { font-size: 12px; color: #a8a29e; }
  .cat-arrow { font-size: 12px; color: #a8a29e; transition: transform 0.2s; display: inline-block; }
  .cat-arrow.open { transform: rotate(90deg); }

  /* Items */
  .items { padding: 4px 0 4px 18px; }
  .item-btn {
    width: 100%; display: flex; align-items: center; gap: 12px;
    padding: 11px 8px; background: transparent; border: none;
    border-bottom: 1px solid #f5f5f4; cursor: pointer;
    font-size: 15px; text-align: left; color: #44403c;
    font-family: inherit; -webkit-appearance: none; transition: all 0.1s;
  }
  .item-btn:active { background: #fafaf9; }
  .item-btn.done { color: #16a34a; }
  .cb {
    width: 24px; height: 24px; border-radius: 7px;
    border: 2.5px solid #d6d3d1; background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #fff; flex-shrink: 0; transition: all 0.15s;
  }
  .cb.done { border-color: #16a34a; background: #16a34a; }
  .item-text.done { text-decoration: line-through; opacity: 0.5; }

  .hint { text-align: center; padding: 28px 0; color: #a8a29e; font-size: 15px; }

  /* Save indicator */
  .save-toast {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
    background: #1c1917; color: #fff; padding: 8px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 100;
  }
  .save-toast.show { opacity: 1; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <h1>Fahrzeugcheck</h1>
  <p>Vollzähligkeit &amp; Funktionsprüfung</p>
</div>
<div class="tabs" id="tabs"></div>
<div class="progress-row">
  <div class="progress-bg"><div class="progress-fill" id="pFill"></div></div>
  <span class="progress-text" id="pText"></span>
  <button class="reset-btn" onclick="doReset()">Reset</button>
</div>
<div class="vehicle-wrap" id="vWrap">
  <div class="vehicle-inner" id="vInner"></div>
</div>
<div id="panel"></div>
<div class="save-toast" id="toast">Gespeichert ✓</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════
var D={
RTW:{label:"Rettungswagen",color:"#b91c1c",zones:{
kabine:{label:"Fahrer\u00adkabine",x:12,y:18,w:26,h:28,items:{
"Fahrzeugpapiere":["Zulassungsbescheinigung","Pr\u00fcfbericht HU/AU","Versicherungsnachweis","Betriebserlaubnis"],
"Kommunikation":["Digitalfunk (Tetra) \u2013 Test","Handfunkger\u00e4t \u2013 Akku","Mobiltelefon + Kabel"],
"Kabine allgemein":["Warnwesten (2\u00d7)","Taschenlampe","Navi OK","Desinfektionsmittel"],
"Fahrzeugcheck":["Tank > 75%","\u00d6lstand","K\u00fchlwasser","Reifendruck","Beleuchtung","Sondersignal"]}},
patient:{label:"Patienten\u00adraum",x:38,y:12,w:38,h:40,items:{
"Trage / Fahrtrage":["Fahrgestell OK","Gurte vollst\u00e4ndig","Schaufeltrage","Vakuummatratze+Pumpe"],
"Roter Notfallkoffer":["Beatmungsbeutel Erw.+Kind","Guedel-Tuben (1\u20135)","Laryngoskop+Spatel","ET-Tuben sortiert","Stethoskop","RR-Messger\u00e4t","Pulsoximeter","Absaugpumpe manuell"],
"Blauer Koffer (Kreislauf)":["Infusionen (NaCl, Ringer)","Infusionsbesteck/Kan\u00fclen","Stauschlauch","Dreiwegehahn","Pflaster/Fixierung"],
"Sauerstoff":["O\u2082-Flasche > 80%","O\u2082-Maske Erw.+Kind","Nasenbrille","Flowmeter OK"],
"Defibrillator / AED":["Selbsttest OK","Pads (Ablaufdatum!)","Ersatz-Pads","Akku geladen"],
"Absaugung":["Elektr. Absaugpumpe","Katheter versch. Gr\u00f6\u00dfen","Sekretbeh\u00e4lter leer"],
"Medikamente":["Adrenalin","Amiodaron","Salbutamol","Glucose 40%","Paracetamol rektal","NTG-Spray","Midazolam nasal"],
"Verbandmaterial":["Verbandp\u00e4ckchen gr./kl.","Brandwundenset","Tourniquet","Dreieckt\u00fccher","Rettungsdecke (2\u00d7)","SAM-Splint/Schienen"]}},
seiteL:{label:"Seite L",x:38,y:3,w:38,h:9,items:{
"Techn. Rettung":["Feuerl\u00f6scher 6kg","Warndreieck","Unterlegkeile","Brechstange"],
"Hygiene":["Handschuhe S\u2013XL","Schutzbrillen","FFP2-Masken","Desinfektionst\u00fccher","M\u00fcllbeutel"]}},
seiteR:{label:"Seite R",x:38,y:52,w:38,h:9,items:{
"Tragehilfen":["Tragestuhl","Tragetuch","Spineboard+Gurte","HWS-St\u00fctzen"],
"Zusatz":["Decken (2\u00d7)","Kissen","Nierenschale","Urinflasche","Brechbeutel"]}},
heck:{label:"Heck",x:76,y:15,w:16,h:34,items:{
"Heckklappe":["Beleuchtung OK","Gasdruckfedern OK","Trittstufe sauber"],
"Rucksack Erstangriff":["Beatmungsbeutel","Absaugung manuell","Verbandstoffe","Stifneck-Set","Handschuhe/Schere"]}}}},

KTW:{label:"Krankentransportwagen",color:"#1d4ed8",zones:{
kabine:{label:"Fahrer\u00adkabine",x:12,y:18,w:26,h:28,items:{
"Fahrzeugpapiere":["Zulassungsbescheinigung","Pr\u00fcfbericht HU/AU","Versicherungsnachweis"],
"Kommunikation":["Digitalfunk \u2013 Test","Mobiltelefon + Kabel"],
"Fahrzeugcheck":["Tank > 75%","\u00d6lstand","Beleuchtung","Sondersignal"]}},
patient:{label:"Patienten\u00adraum",x:38,y:12,w:38,h:40,items:{
"Trage":["Fahrtrage Funktion","Gurte OK","Tragestuhl"],
"Notfallkoffer Basis":["Beatmungsbeutel","Guedel-Tuben","Stethoskop","RR-Messger\u00e4t","Pulsoximeter"],
"Sauerstoff":["O\u2082-Flasche F\u00fcllstand","O\u2082-Maske+Nasenbrille","Flowmeter"],
"AED":["Selbsttest OK","Pads Ablaufdatum","Akku geladen"],
"Basismedikamente":["Glucose 40%","NTG-Spray","Salbutamol"],
"Verbandmaterial":["Verbandp\u00e4ckchen","Pflaster","Dreieckt\u00fccher","Rettungsdecke"]}},
seiteL:{label:"Seite L",x:38,y:3,w:38,h:9,items:{
"Sicherheit":["Feuerl\u00f6scher","Warndreieck","Handschuhe","FFP2-Masken"]}},
seiteR:{label:"Seite R",x:38,y:52,w:38,h:9,items:{
"Komfort":["Decken","Kissen","Nierenschale","Brechbeutel","Urinflasche"]}},
heck:{label:"Heck",x:76,y:15,w:16,h:34,items:{
"Heckbereich":["Beleuchtung OK","Heckklappe OK","Trittstufe sauber","Rollstuhlrampe"]}}}},

NEF:{label:"Notarzteinsatzfahrzeug",color:"#b91c1c",zones:{
kabine:{label:"Fahrer\u00adkabine",x:10,y:20,w:28,h:24,items:{
"Papiere":["Zulassungsbescheinigung","Pr\u00fcfbericht HU/AU"],
"Kommunikation":["Digitalfunk (Tetra)","Handfunkger\u00e4t","Mobiltelefon"],
"Fahrzeugcheck":["Tank > 75%","Beleuchtung","Sondersignal","\u00d6l/K\u00fchlwasser"]}},
koffer:{label:"Koffer\u00adraum",x:62,y:14,w:28,h:36,items:{
"Rucksack A (Airway)":["Laryngoskop+Spatel","ET-Tuben (3\u20138)","Videolaryngoskop","Koniotomie-Set","Beatmungsbeutel+Masken","Guedel-/Wendl-Tuben","Magill-Zange","Absaugkatheter"],
"Rucksack B (Breathing)":["Thoraxdrainage-Set","Stethoskop","SpO\u2082-Sensor","Kapnographie","Beatmungsger\u00e4t"],
"Rucksack C (Circulation)":["Infusionen (NaCl,Ringer,HAES)","ZVK-Set","IO-Bohrer (EZ-IO)","Druckinfusionsmanschette","Spritzenpumpe","RR-Messger\u00e4t"],
"Medikamentenkoffer":["Adrenalin","Noradrenalin","Amiodaron","Atropin","Midazolam","Ketamin/Esketamin","Fentanyl/Sufentanil","Propofol","Rocuronium/Succinylcholin","Akrinor","Urapidil","Heparin","Tranexams\u00e4ure","Glukose 40%","NTG-Spray","Salbutamol","Prednisolon","Naloxon","Flumazenil","Magnesium","Calcium","NaBi 8,4%"],
"Defi / Monitor":["Selbsttest OK","12-Kanal-EKG","Defi-Pads+Ersatz","SpO\u2082/etCO\u2082","Schrittmacher","Akku+Ersatzakku"],
"Kindernotfall":["P\u00e4d. Besteck","Kinderbeatmungsbeutel","Tuben/Masken Kinder","Broselow-Band","Dosierungstabelle"]}},
seiteL:{label:"Seite L",x:38,y:5,w:24,h:9,items:{
"Schutzausr\u00fcstung":["Handschuhe","Schutzbrillen","FFP2/FFP3","Infektschutzanzug"]}},
seiteR:{label:"Seite R",x:38,y:50,w:24,h:9,items:{
"Zusatz":["Rettungsdecken","SAM-Splint/Schienen","Spineboard","Beckenschlinge"]}},
front:{label:"Front",x:3,y:22,w:9,h:20,items:{
"Fahrzeugfront":["Frontbeleuchtung","Sondersignal","Scheibe sauber","Scheibenwischer OK"]}}}}
};

// ═══════════════════════════════════════════════════════════════════════
// STATE + PERSISTENCE
// ═══════════════════════════════════════════════════════════════════════
var chk, aV, aZ, aC;
var STORAGE_KEY = 'fzcheck_state';

function buildEmpty() {
  var s = {};
  for (var vk in D) { s[vk] = {}; for (var zk in D[vk].zones) { s[vk][zk] = {}; for (var cat in D[vk].zones[zk].items) { s[vk][zk][cat] = D[vk].zones[zk].items[cat].map(function(){ return false; }); }}}
  return s;
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      var saved = JSON.parse(raw);
      chk = saved.chk || buildEmpty();
      aV = saved.aV || "RTW";
      // Validate
      if (!D[aV]) aV = "RTW";
    } else {
      chk = buildEmpty();
      aV = "RTW";
    }
  } catch(e) {
    chk = buildEmpty();
    aV = "RTW";
  }
  aZ = null;
  aC = null;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ chk: chk, aV: aV }));
    showToast();
  } catch(e) {}
}

var toastTimer;
function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1200);
}

loadState();

// ═══════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════
function zP(vk,zk){var d=0,t=0;for(var c in chk[vk][zk]){var a=chk[vk][zk][c];t+=a.length;for(var i=0;i<a.length;i++)if(a[i])d++;}return{d:d,t:t};}
function vP(vk){var d=0,t=0;for(var zk in D[vk].zones){var p=zP(vk,zk);d+=p.d;t+=p.t;}return{d:d,t:t};}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function render(){
  var v=D[aV], c=v.color;

  // Tabs
  var h="";
  for(var k in D){
    var vd=D[k], act=k===aV, p=vP(k), pct=p.t?Math.round(p.d/p.t*100):0;
    h+='<button class="tab'+(act?' active':'')+'" style="'+(act?'background:'+vd.color+';border-color:'+vd.color+';color:#fff':'')+'" onclick="switchV(\''+k+'\')"><div>'+k+'</div><div class="tab-pct">'+pct+'%</div></button>';
  }
  document.getElementById("tabs").innerHTML=h;

  // Progress
  var vp=vP(aV), vpct=vp.t?Math.round(vp.d/vp.t*100):0;
  document.getElementById("pFill").style.width=vpct+"%";
  document.getElementById("pFill").style.background=vpct===100?"#16a34a":c;
  document.getElementById("pText").textContent=vp.d+"/"+vp.t;
  document.getElementById("pText").style.color=vpct===100?"#16a34a":c;

  // Vehicle
  document.getElementById("vWrap").style.border="2px solid "+c+"33";
  var isNEF=aV==="NEF";
  var svg='<svg class="vehicle-svg" viewBox="0 0 400 200">';
  svg+='<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="'+c+'" stop-opacity="0.12"/><stop offset="100%" stop-color="'+c+'" stop-opacity="0.04"/></linearGradient></defs>';
  
  if(isNEF){
    svg+='<rect x="30" y="40" width="340" height="120" rx="20" fill="url(#bg)" stroke="'+c+'" stroke-width="2" stroke-opacity="0.3"/>';
    svg+='<rect x="30" y="40" width="120" height="120" rx="20" fill="'+c+'" fill-opacity="0.06" stroke="'+c+'" stroke-width="1.5" stroke-opacity="0.2"/>';
    svg+='<ellipse cx="90" cy="46" rx="22" ry="8" fill="'+c+'" fill-opacity="0.2"/><ellipse cx="90" cy="154" rx="22" ry="8" fill="'+c+'" fill-opacity="0.2"/>';
    svg+='<ellipse cx="310" cy="46" rx="22" ry="8" fill="'+c+'" fill-opacity="0.2"/><ellipse cx="310" cy="154" rx="22" ry="8" fill="'+c+'" fill-opacity="0.2"/>';
    svg+='<rect x="140" y="85" width="30" height="30" rx="4" fill="#3b82f6" fill-opacity="0.2"/>';
  } else {
    svg+='<rect x="20" y="30" width="360" height="140" rx="16" fill="url(#bg)" stroke="'+c+'" stroke-width="2" stroke-opacity="0.3"/>';
    svg+='<rect x="20" y="30" width="110" height="140" rx="16" fill="'+c+'" fill-opacity="0.06" stroke="'+c+'" stroke-width="1.5" stroke-opacity="0.2"/>';
    svg+='<line x1="145" y1="38" x2="145" y2="162" stroke="'+c+'" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="6 4"/>';
    svg+='<ellipse cx="80" cy="36" rx="24" ry="9" fill="'+c+'" fill-opacity="0.2"/><ellipse cx="80" cy="164" rx="24" ry="9" fill="'+c+'" fill-opacity="0.2"/>';
    svg+='<ellipse cx="320" cy="36" rx="24" ry="9" fill="'+c+'" fill-opacity="0.2"/><ellipse cx="320" cy="164" rx="24" ry="9" fill="'+c+'" fill-opacity="0.2"/>';
    svg+='<rect x="160" y="82" width="34" height="34" rx="6" fill="#3b82f6" fill-opacity="0.15"/>';
  }
  svg+='<polygon points="8,100 20,90 20,110" fill="'+c+'" fill-opacity="0.2"/>';
  svg+='<text x="10" y="188" fill="'+c+'" fill-opacity="0.3" font-size="10" font-family="sans-serif">\u25b8 Fahrtrichtung</text></svg>';

  // Zones
  for(var zk in v.zones){
    var z=v.zones[zk], p=zP(aV,zk), done=p.t>0&&p.d===p.t, act=aZ===zk;
    var bg2=done?"#16a34a":act?c:"#fff";
    var fg=(done||act)?"#fff":c;
    var brd=done?"#15803d":act?c:c+"88";
    svg+='<button class="zone-btn" onclick="clickZ(\''+zk+'\')" style="left:'+z.x+'%;top:'+z.y+'%;width:'+z.w+'%;height:'+z.h+'%;background:'+bg2+';border-color:'+brd+';opacity:'+(act||done?1:0.88)+';box-shadow:'+(act?'0 0 14px '+c+'33':'0 1px 5px rgba(0,0,0,0.1)')+';">';
    svg+='<span class="zone-label" style="color:'+fg+'">'+z.label+'</span>';
    svg+='<span class="zone-count" style="color:'+fg+'">'+p.d+'/'+p.t+(done?' \u2713':'')+'</span></button>';
  }
  document.getElementById("vInner").innerHTML=svg;

  // Panel
  if(!aZ||!v.zones[aZ]){
    document.getElementById("panel").innerHTML='<div class="hint">\u2191 Tippe auf eine Zone im Fahrzeug</div>';
    return;
  }
  var zone=v.zones[aZ];
  var ph='<div class="panel" style="border:2px solid '+c+'22">';
  ph+='<div class="panel-title" style="color:'+c+'">'+zone.label+'</div>';

  for(var cat in zone.items){
    var items=zone.items[cat], ca=chk[aV][aZ][cat]||[];
    var cd=0; for(var i=0;i<ca.length;i++) if(ca[i]) cd++;
    var cc=cd===items.length, isExp=aC===cat;
    var catEsc=cat.replace(/'/g,"\\'");

    ph+='<button class="cat-btn'+(isExp?' expanded':'')+(cc?' complete':'')+'" style="background:'+(isExp?c+'0d':'#fafaf9')+';border-color:'+(isExp?c+'44':'#e7e5e4')+';" onclick="clickC(\''+catEsc+'\')">';
    ph+='<span class="cat-badge'+(cc?' complete':'')+'">'+( cc?'\u2713':cd)+'</span>';
    ph+='<span class="cat-name">'+cat+'</span>';
    ph+='<span class="cat-count">'+cd+'/'+items.length+'</span>';
    ph+='<span class="cat-arrow'+(isExp?' open':'')+'">\u25b8</span></button>';

    if(isExp){
      ph+='<div class="items">';
      for(var j=0;j<items.length;j++){
        var dn=ca[j];
        ph+='<button class="item-btn'+(dn?' done':'')+'" onclick="toggle(\''+aZ+'\',\''+catEsc+'\','+j+')">';
        ph+='<span class="cb'+(dn?' done':'')+'">'+( dn?'\u2713':'')+'</span>';
        ph+='<span class="item-text'+(dn?' done':'')+'">'+items[j]+'</span></button>';
      }
      ph+='</div>';
    }
  }
  ph+='</div>';
  document.getElementById("panel").innerHTML=ph;
}

// ═══════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════
function switchV(k){ aV=k; aZ=null; aC=null; saveState(); render(); }
function clickZ(zk){
  aZ = aZ===zk ? null : zk;
  aC = null;
  render();
  if(aZ) setTimeout(function(){ document.getElementById("panel").scrollIntoView({behavior:"smooth",block:"start"}); }, 60);
}
function clickC(cat){ aC = aC===cat ? null : cat; render(); }
function toggle(zk, cat, idx){
  chk[aV][zk][cat][idx] = !chk[aV][zk][cat][idx];
  saveState();
  render();
}
function doReset(){
  if(!confirm('Alle Häkchen für '+aV+' zurücksetzen?')) return;
  for(var zk in D[aV].zones) for(var cat in D[aV].zones[zk].items)
    chk[aV][zk][cat] = D[aV].zones[zk].items[cat].map(function(){ return false; });
  aZ=null; aC=null; saveState(); render();
}

// ═══════════════════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

render();
</script>
</body>
</html>
