<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FzCheck">
<meta name="theme-color" content="#b91c1c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Fahrzeugcheck</title>
<style>
  :root{--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#fafaf9;color:#1c1917;font-family:-apple-system,'SF Pro Display','Helvetica Neue',system-ui,sans-serif;padding:calc(14px + var(--st)) 12px calc(20px + var(--sb));max-width:560px;margin:0 auto;min-height:100vh;-webkit-text-size-adjust:100%}
  .header{text-align:center;margin-bottom:16px}
  .header h1{font-size:22px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
  .header p{font-size:12px;color:#78716c;margin-top:2px}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tab{flex:1;padding:10px 4px;border-radius:14px;cursor:pointer;font-weight:700;font-size:16px;text-align:center;border:2.5px solid #d6d3d1;background:#fff;color:#57534e;transition:all 0.2s;-webkit-appearance:none;font-family:inherit}
  .tab:active{transform:scale(0.97)}
  .tab.active{color:#fff;box-shadow:0 3px 12px rgba(0,0,0,0.15)}
  .tab-pct{font-size:11px;font-weight:500;opacity:0.8;margin-top:3px}
  .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .progress-bg{flex:1;height:8px;background:#e7e5e4;border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;border-radius:4px;transition:width 0.4s ease}
  .progress-text{font-size:14px;font-weight:700;min-width:55px;text-align:right}
  .reset-btn{font-size:12px;padding:5px 12px;background:#f5f5f4;border:1.5px solid #d6d3d1;color:#78716c;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;-webkit-appearance:none}
  .reset-btn:active{background:#e7e5e4}
  .vehicle-wrap{position:relative;width:100%;padding-bottom:65%;background:#fff;border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  .vehicle-inner{position:absolute;inset:0}
  .vehicle-svg{width:100%;height:100%;position:absolute;top:0;left:0;pointer-events:none}
  .zone-btn{position:absolute;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.2s;z-index:2;padding:3px;border:2.5px solid;-webkit-appearance:none;font-family:inherit;box-shadow:0 1px 5px rgba(0,0,0,0.1)}
  .zone-btn:active{transform:scale(0.95)}
  .zone-label{font-size:10px;font-weight:700;line-height:1.15;text-align:center;pointer-events:none}
  .zone-count{font-size:9px;opacity:0.85;margin-top:1px;pointer-events:none}
  .panel{background:#fff;border-radius:18px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.07);animation:fadeIn 0.25s ease}
  .panel-title{font-size:18px;font-weight:800;margin-bottom:14px}
  .item-row{width:100%;display:flex;align-items:center;gap:10px;padding:11px 12px;background:#fafaf9;border:1.5px solid #e7e5e4;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600;text-align:left;transition:all 0.15s;color:#1c1917;margin-bottom:6px;font-family:inherit;-webkit-appearance:none}
  .item-row:active{transform:scale(0.98)}
  .item-row.done{color:#16a34a}
  .item-row.expanded{background:#fafaf8}
  .item-cb{width:24px;height:24px;border-radius:7px;border:2.5px solid #d6d3d1;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;transition:all 0.15s}
  .item-cb.done{border-color:#16a34a;background:#16a34a}
  .item-name{flex:1}
  .item-name.striked{text-decoration:line-through;opacity:0.5}
  .item-arrow{font-size:11px;color:#a8a29e;transition:transform 0.2s;display:inline-block}
  .item-arrow.open{transform:rotate(90deg)}
  .item-badge{font-size:11px;color:#a8a29e}
  .sub-list{padding:4px 0 4px 20px}
  .sub-row{width:100%;display:flex;align-items:center;gap:10px;padding:10px 8px;background:transparent;border:none;border-bottom:1px solid #f5f5f4;cursor:pointer;font-size:14px;text-align:left;color:#44403c;font-family:inherit;-webkit-appearance:none;transition:all 0.1s}
  .sub-row:active{background:#fafaf9}
  .sub-row.done{color:#16a34a}
  .sub-cb{width:22px;height:22px;border-radius:6px;border:2.5px solid #d6d3d1;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;transition:all 0.15s}
  .sub-cb.done{border-color:#16a34a;background:#16a34a}
  .sub-name{flex:1}
  .sub-name.striked{text-decoration:line-through;opacity:0.5}
  .hint{text-align:center;padding:24px 0;color:#a8a29e;font-size:14px}
  .save-toast{position:fixed;bottom:calc(20px + var(--sb));left:50%;transform:translateX(-50%);background:#1c1917;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
  .save-toast.show{opacity:1}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="header">
  <h1>Fahrzeugcheck</h1>
  <p>Vollzähligkeit &amp; Funktionsprüfung</p>
</div>
<div class="tabs" id="tabs"></div>
<div class="progress-row">
  <div class="progress-bg"><div class="progress-fill" id="pFill"></div></div>
  <span class="progress-text" id="pText"></span>
  <button class="reset-btn" onclick="doReset()">Reset</button>
</div>
<div class="vehicle-wrap" id="vWrap">
  <div class="vehicle-inner" id="vInner"></div>
</div>
<div id="panel"></div>
<div class="save-toast" id="toast">Gespeichert &#10003;</div>

<script>
// =====================================================================
//
//  FAHRZEUGDATEN – HIER ALLES ANPASSEN!
//
//  Jedes Fahrzeug hat:
//    label  = Anzeigename
//    color  = Farbe (Hex-Code)
//    zones  = Die klickbaren Bereiche auf der Draufsicht
//
//  Jede Zone hat:
//    label  = Name auf dem Button
//    x,y    = Position in % (von links, von oben)
//    w,h    = Größe in % (Breite, Höhe)
//    items  = Die Checkliste
//
//  Items können sein:
//    "Text"                              → einfache Checkbox
//    { name: "Text", sub: ["A","B"] }    → Dropdown mit Sub-Items
//
// =====================================================================

var VEHICLES = {

// ─────────────────────────────────────────────────────────────────────
// RTW – RETTUNGSWAGEN
// ─────────────────────────────────────────────────────────────────────
RTW: {
  label: "Rettungswagen",
  color: "#b91c1c",
  zones: {

    fahrerTuer: {
      label: "Fahrer\u00adtür",
      x: 6, y: 5, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2",
        "Beispiel-Item 3"
      ]
    },

    beifahrerTuer: {
      label: "Beifahrer\u00adtür",
      x: 6, y: 73, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    },

    hintenLinks: {
      label: "Hinten links",
      x: 42, y: 5, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    },

    hintenRechts: {
      label: "Hinten rechts",
      x: 42, y: 73, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    },

    kofferraumL: {
      label: "Heck L",
      x: 72, y: 5, w: 22, h: 25,
      items: [
        "Beispiel-Item 1",
        { name: "Roter Koffer", sub: [
          "Sub-Item 1",
          "Sub-Item 2",
          "Sub-Item 3"
        ]}
      ]
    },

    kofferraumM: {
      label: "Heck M",
      x: 72, y: 33, w: 22, h: 34,
      items: [
        "Beispiel-Item 1",
        { name: "Blauer Koffer", sub: [
          "Sub-Item 1",
          "Sub-Item 2"
        ]}
      ]
    },

    kofferraumR: {
      label: "Heck R",
      x: 72, y: 70, w: 22, h: 25,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    }

  }
},

// ─────────────────────────────────────────────────────────────────────
// KTW – KRANKENTRANSPORTWAGEN
// ─────────────────────────────────────────────────────────────────────
KTW: {
  label: "Krankentransportwagen",
  color: "#1d4ed8",
  zones: {

    fahrerTuer: {
      label: "Fahrer\u00adtür",
      x: 6, y: 5, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    },

    beifahrerTuer: {
      label: "Beifahrer\u00adtür",
      x: 6, y: 73, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    },

    hintenLinks: {
      label: "Hinten links",
      x: 42, y: 5, w: 22, h: 22,
      items: [
        "Beispiel-Item 1"
      ]
    },

    hintenRechts: {
      label: "Hinten rechts",
      x: 42, y: 73, w: 22, h: 22,
      items: [
        "Beispiel-Item 1"
      ]
    },

    kofferraum: {
      label: "Koffer\u00adraum",
      x: 72, y: 20, w: 22, h: 60,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2",
        { name: "Notfallkoffer", sub: [
          "Sub-Item 1",
          "Sub-Item 2"
        ]}
      ]
    }

  }
},

// ─────────────────────────────────────────────────────────────────────
// NEF – NOTARZTEINSATZFAHRZEUG
// ─────────────────────────────────────────────────────────────────────
NEF: {
  label: "Notarzteinsatzfahrzeug",
  color: "#b91c1c",
  zones: {

    fahrerTuer: {
      label: "Fahrer\u00adtür",
      x: 6, y: 5, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    },

    beifahrerTuer: {
      label: "Beifahrer\u00adtür",
      x: 6, y: 73, w: 22, h: 22,
      items: [
        "Beispiel-Item 1",
        "Beispiel-Item 2"
      ]
    },

    hintenLinks: {
      label: "Hinten links",
      x: 42, y: 5, w: 22, h: 22,
      items: [
        "HWS-Schiene Erwachsene",
        "HWS-Schiene STIFNECK SELECT Kinder",
        "Kennzeichnungsweste gelb Leitender NOTARZT"
      ]
    },

    hintenRechts: {
      label: "Hinten rechts",
      x: 42, y: 73, w: 22, h: 22,
      items: [
        "Beispiel-Item 1"
      ]
    },

    kofferraumL: {
      label: "Heck L",
      x: 72, y: 5, w: 22, h: 25,
      items: [
        "Beispiel-Item 1",
        { name: "Rucksack A (Airway)", sub: [
          "Sub-Item 1",
          "Sub-Item 2"
        ]}
      ]
    },

    kofferraumM: {
      label: "Heck M",
      x: 72, y: 33, w: 22, h: 34,
      items: [
        { name: "Medikamentenkoffer", sub: [
          "Sub-Item 1",
          "Sub-Item 2",
          "Sub-Item 3"
        ]}
      ]
    },

    kofferraumR: {
      label: "Heck R",
      x: 72, y: 70, w: 22, h: 25,
      items: [
        { name: "Defi / Monitor", sub: [
          "Sub-Item 1",
          "Sub-Item 2"
        ]}
      ]
    }

  }
}

};

// =====================================================================
// AB HIER NICHTS ÄNDERN
// =====================================================================
var chk={},aV="RTW",aZ=null,aI=null,SK="fzcheck_v3";

function buildEmpty(){var s={};for(var vk in VEHICLES){s[vk]={};for(var zk in VEHICLES[vk].zones){s[vk][zk]=[];var items=VEHICLES[vk].zones[zk].items;for(var i=0;i<items.length;i++){var it=items[i];if(typeof it==="string"){s[vk][zk].push({done:false});}else{var subs=[];for(var j=0;j<it.sub.length;j++)subs.push(false);s[vk][zk].push({done:false,sub:subs});}}}}return s;}
function load(){try{var r=localStorage.getItem(SK);if(r){chk=JSON.parse(r);}else{chk=buildEmpty();}for(var vk in VEHICLES){if(!chk[vk]){chk=buildEmpty();break;}}}catch(e){chk=buildEmpty();}}
function save(){try{localStorage.setItem(SK,JSON.stringify(chk));showT();}catch(e){}}
var tT;function showT(){var t=document.getElementById("toast");t.classList.add("show");clearTimeout(tT);tT=setTimeout(function(){t.classList.remove("show");},1000);}
load();

function zC(vk,zk){var items=VEHICLES[vk].zones[zk].items,cs=chk[vk][zk],d=0,t=0;for(var i=0;i<items.length;i++){var it=items[i];if(typeof it==="string"){t++;if(cs[i]&&cs[i].done)d++;}else{for(var j=0;j<it.sub.length;j++){t++;if(cs[i]&&cs[i].sub&&cs[i].sub[j])d++;}}}return{d:d,t:t};}
function vC(vk){var d=0,t=0;for(var zk in VEHICLES[vk].zones){var p=zC(vk,zk);d+=p.d;t+=p.t;}return{d:d,t:t};}
function sDone(vk,zk,i){var it=VEHICLES[vk].zones[zk].items[i];if(typeof it==="string")return chk[vk][zk][i].done;var s=chk[vk][zk][i].sub;for(var j=0;j<s.length;j++)if(!s[j])return false;return true;}
function sC(vk,zk,i){var s=chk[vk][zk][i].sub||[],d=0;for(var j=0;j<s.length;j++)if(s[j])d++;return{d:d,t:s.length};}

function drawCar(C){
  var svg='<svg class="vehicle-svg" viewBox="0 0 400 260"><defs><linearGradient id="cbg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="'+C+'" stop-opacity="0.10"/><stop offset="100%" stop-color="'+C+'" stop-opacity="0.04"/></linearGradient></defs>';
  svg+='<rect x="30" y="35" width="340" height="190" rx="30" ry="30" fill="url(#cbg)" stroke="'+C+'" stroke-width="2" stroke-opacity="0.3"/>';
  svg+='<rect x="45" y="55" width="60" height="150" rx="12" fill="'+C+'" fill-opacity="0.06" stroke="'+C+'" stroke-width="1" stroke-opacity="0.15"/>';
  svg+='<rect x="300" y="65" width="50" height="130" rx="10" fill="'+C+'" fill-opacity="0.06" stroke="'+C+'" stroke-width="1" stroke-opacity="0.15"/>';
  svg+='<rect x="120" y="60" width="170" height="140" rx="8" fill="'+C+'" fill-opacity="0.03" stroke="'+C+'" stroke-width="0.5" stroke-opacity="0.1"/>';
  svg+='<line x1="200" y1="40" x2="200" y2="220" stroke="'+C+'" stroke-width="1.5" stroke-opacity="0.12"/>';
  svg+='<ellipse cx="85" cy="38" rx="28" ry="9" fill="'+C+'" fill-opacity="0.2"/><ellipse cx="85" cy="222" rx="28" ry="9" fill="'+C+'" fill-opacity="0.2"/>';
  svg+='<ellipse cx="315" cy="38" rx="28" ry="9" fill="'+C+'" fill-opacity="0.2"/><ellipse cx="315" cy="222" rx="28" ry="9" fill="'+C+'" fill-opacity="0.2"/>';
  svg+='<ellipse cx="55" cy="32" rx="8" ry="5" fill="'+C+'" fill-opacity="0.15"/><ellipse cx="55" cy="228" rx="8" ry="5" fill="'+C+'" fill-opacity="0.15"/>';
  svg+='<rect x="32" y="55" width="8" height="30" rx="3" fill="#f59e0b" fill-opacity="0.25"/><rect x="32" y="175" width="8" height="30" rx="3" fill="#f59e0b" fill-opacity="0.25"/>';
  svg+='<rect x="360" y="60" width="6" height="25" rx="3" fill="#dc2626" fill-opacity="0.2"/><rect x="360" y="175" width="6" height="25" rx="3" fill="#dc2626" fill-opacity="0.2"/>';
  svg+='<polygon points="10,130 25,118 25,142" fill="'+C+'" fill-opacity="0.2"/>';
  svg+='<text x="8" y="254" fill="'+C+'" fill-opacity="0.25" font-size="10" font-family="sans-serif">\u25b8 Fahrtrichtung</text>';
  svg+='<text x="130" y="30" fill="'+C+'" fill-opacity="0.2" font-size="8" font-family="sans-serif" text-anchor="middle">Links</text>';
  svg+='<text x="130" y="254" fill="'+C+'" fill-opacity="0.2" font-size="8" font-family="sans-serif" text-anchor="middle">Rechts</text>';
  svg+='</svg>';
  return svg;
}

function render(){
  var v=VEHICLES[aV],C=v.color;

  // Tabs
  var th="";
  for(var k in VEHICLES){var vd=VEHICLES[k],act=k===aV,p=vC(k),pct=p.t?Math.round(p.d/p.t*100):0;
    th+='<button class="tab'+(act?' active':'')+'" style="'+(act?'background:'+vd.color+';border-color:'+vd.color+';color:#fff':'')+'" onclick="switchV(\''+k+'\')"><div>'+k+'</div><div class="tab-pct">'+pct+'%</div></button>';}
  document.getElementById("tabs").innerHTML=th;

  // Progress
  var vp=vC(aV),vpct=vp.t?Math.round(vp.d/vp.t*100):0;
  document.getElementById("pFill").style.width=vpct+"%";
  document.getElementById("pFill").style.background=vpct===100?"#16a34a":C;
  document.getElementById("pText").textContent=vp.d+"/"+vp.t;
  document.getElementById("pText").style.color=vpct===100?"#16a34a":C;
  document.getElementById("vWrap").style.border="2px solid "+C+"33";

  // Car + zones
  var html=drawCar(C);
  for(var zk in v.zones){var z=v.zones[zk],p=zC(aV,zk),done=p.t>0&&p.d===p.t,act2=aZ===zk;
    var bg=done?"#16a34a":act2?C:"#fff",fg=(done||act2)?"#fff":C,brd=done?"#15803d":act2?C:C+"77";
    html+='<button class="zone-btn" onclick="clickZ(\''+zk+'\')" style="left:'+z.x+'%;top:'+z.y+'%;width:'+z.w+'%;height:'+z.h+'%;background:'+bg+';border-color:'+brd+';opacity:'+(act2||done?1:0.88)+';box-shadow:'+(act2?'0 0 14px '+C+'33':'0 1px 5px rgba(0,0,0,0.1)')+';">';
    html+='<span class="zone-label" style="color:'+fg+'">'+z.label+'</span>';
    html+='<span class="zone-count" style="color:'+fg+'">'+p.d+'/'+p.t+(done?' \u2713':'')+'</span></button>';}
  document.getElementById("vInner").innerHTML=html;

  // Panel
  if(!aZ||!v.zones[aZ]){document.getElementById("panel").innerHTML='<div class="hint">\u2191 Tippe auf eine Zone am Fahrzeug</div>';return;}
  var zone=v.zones[aZ],items=zone.items,cs=chk[aV][aZ];
  var ph='<div class="panel" style="border:2px solid '+C+'22"><div class="panel-title" style="color:'+C+'">'+zone.label.replace(/\u00ad/g,'')+'</div>';
  for(var i=0;i<items.length;i++){var it=items[i],hasSub=typeof it!=="string",name=hasSub?it.name:it,isDone=hasSub?sDone(aV,aZ,i):cs[i].done,isExp=aI===i&&hasSub;
    if(hasSub){var sc=sC(aV,aZ,i);
      ph+='<button class="item-row'+(isDone?' done':'')+(isExp?' expanded':'')+'" style="'+(isExp?'border-color:'+C+'44;background:'+C+'08':'')+'" onclick="clickI('+i+')"><span class="item-cb'+(isDone?' done':'')+'">'+( isDone?'\u2713':'')+'</span><span class="item-name'+(isDone?' striked':'')+'">'+name+'</span><span class="item-badge">'+sc.d+'/'+sc.t+'</span><span class="item-arrow'+(isExp?' open':'')+'">\u25b8</span></button>';
      if(isExp){ph+='<div class="sub-list">';for(var j=0;j<it.sub.length;j++){var sd=cs[i].sub[j];
        ph+='<button class="sub-row'+(sd?' done':'')+'" onclick="tSub(\''+aZ+'\','+i+','+j+')"><span class="sub-cb'+(sd?' done':'')+'">'+( sd?'\u2713':'')+'</span><span class="sub-name'+(sd?' striked':'')+'">'+it.sub[j]+'</span></button>';}ph+='</div>';}}
    else{ph+='<button class="item-row'+(isDone?' done':'')+'" onclick="tItem(\''+aZ+'\','+i+')"><span class="item-cb'+(isDone?' done':'')+'">'+( isDone?'\u2713':'')+'</span><span class="item-name'+(isDone?' striked':'')+'">'+name+'</span></button>';}}
  ph+='</div>';document.getElementById("panel").innerHTML=ph;}

function switchV(k){aV=k;aZ=null;aI=null;save();render();}
function clickZ(zk){aZ=aZ===zk?null:zk;aI=null;render();if(aZ)setTimeout(function(){document.getElementById("panel").scrollIntoView({behavior:"smooth",block:"start"});},60);}
function clickI(idx){aI=aI===idx?null:idx;render();}
function tItem(zk,idx){chk[aV][zk][idx].done=!chk[aV][zk][idx].done;save();render();}
function tSub(zk,idx,si){chk[aV][zk][idx].sub[si]=!chk[aV][zk][idx].sub[si];save();render();}
function doReset(){if(!confirm("Alle H\u00e4kchen f\u00fcr "+aV+" zur\u00fccksetzen?"))return;for(var zk in VEHICLES[aV].zones){chk[aV][zk]=[];var items=VEHICLES[aV].zones[zk].items;for(var i=0;i<items.length;i++){var it=items[i];if(typeof it==="string"){chk[aV][zk].push({done:false});}else{var subs=[];for(var j=0;j<it.sub.length;j++)subs.push(false);chk[aV][zk].push({done:false,sub:subs});}}}aZ=null;aI=null;save();render();}
